<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La Fiesta 25</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #C9A84C;
      --gold-light: #F0D080;
      --dark: #0E0C0A;
      --dark2: #1A1710;
      --dark3: #252218;
      --cream: #F5F0E8;
      --text-muted: #8A8070;
    }

    body {
      background: var(--dark);
      color: var(--cream);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
    }

    header {
      position: relative;
      text-align: center;
      padding: 5rem 2rem 4rem;
      overflow: hidden;
    }

    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(201,168,76,0.15) 0%, transparent 70%);
      pointer-events: none;
    }

    .header-eyebrow {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1.5rem;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3.5rem, 8vw, 7rem);
      font-weight: 900;
      line-height: 0.9;
      letter-spacing: -0.02em;
      color: var(--cream);
    }

    h1 span {
      color: var(--gold);
      display: block;
    }

    .header-sub {
      margin-top: 1.5rem;
      font-size: 1rem;
      color: var(--text-muted);
      letter-spacing: 0.05em;
    }

    .divider {
      width: 60px;
      height: 1px;
      background: var(--gold);
      margin: 3rem auto;
      opacity: 0.5;
    }

    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 2rem 6rem;
    }

    .section-title {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 2rem;
    }

    .albums-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 2px;
    }

    .album-card {
      position: relative;
      aspect-ratio: 4/3;
      overflow: hidden;
      cursor: pointer;
      text-decoration: none;
      display: block;
      background: var(--dark2);
    }

    .album-card-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      filter: brightness(0.4);
    }

    .album-card:hover .album-card-bg {
      transform: scale(1.05);
      filter: brightness(0.55);
    }

    .album-card-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.15;
    }

    .album-card-placeholder svg {
      width: 60px;
      height: 60px;
    }

    .album-card-info {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 2rem 1.5rem 1.5rem;
      background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 100%);
    }

    .album-card-tag {
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.4rem;
    }

    .album-card-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      font-weight: 700;
      color: white;
      line-height: 1.1;
    }

    .album-card-meta {
      margin-top: 0.5rem;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.5);
    }

    .album-card-badge {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: rgba(201,168,76,0.2);
      border: 1px solid rgba(201,168,76,0.4);
      color: var(--gold-light);
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.3rem 0.7rem;
      border-radius: 20px;
    }

    .album-coming-soon {
      opacity: 0.5;
      pointer-events: none;
    }

    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-muted);
      border: 1px dashed rgba(201,168,76,0.2);
      border-radius: 4px;
    }

    footer {
      text-align: center;
      padding: 2rem;
      font-size: 0.75rem;
      color: var(--text-muted);
      border-top: 1px solid rgba(255,255,255,0.05);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .album-card { animation: fadeUp 0.5s ease both; }
    .album-card:nth-child(1) { animation-delay: 0.05s; }
    .album-card:nth-child(2) { animation-delay: 0.1s; }
    .album-card:nth-child(3) { animation-delay: 0.15s; }
    .album-card:nth-child(4) { animation-delay: 0.2s; }
    .album-card:nth-child(5) { animation-delay: 0.25s; }
    .album-card:nth-child(6) { animation-delay: 0.3s; }
  </style>
</head>
<body>

<header>
  <p class="header-eyebrow">Souvenirs · Fiesta 2025</p>
  <h1>La<span>Fiesta 25</span></h1>
  <p class="header-sub">Toutes les photos de la fête, par photographe</p>
</header>

<main>
  <div class="divider"></div>
  <p class="section-title">Albums photos</p>

  <div class="albums-grid" id="albums-grid">
    <!-- Albums chargés dynamiquement -->
  </div>
</main>

<footer>
  La Fiesta 25 · Photos partagées avec amour
</footer>

<script>
  // ─────────────────────────────────────────────────────────────────────────
  // CONFIGURATION DES ALBUMS
  // Pour ajouter un album : ajoute un objet dans ce tableau.
  // "folder" = nom du dossier dans photos/
  // "name"   = nom affiché
  // "tag"    = étiquette (ex: "Dimanche soir")
  // "cover"  = fichier de couverture dans le dossier (optionnel)
  // "ready"  = false = affiche "Bientôt disponible"
  // ─────────────────────────────────────────────────────────────────────────
  const ALBUMS = [
    {
      folder: "bemorgan",
      name: "Bemorgan",
      tag: "Dimanche soir",
      cover: "",
      ready: true
    },
    // Exemple pour ajouter d'autres albums :
    // {
    //   folder: "photographe2",
    //   name: "Nom du photographe",
    //   tag: "Samedi soir",
    //   cover: "cover.jpg",
    //   ready: false
    // },
  ];

  const grid = document.getElementById('albums-grid');

  if (ALBUMS.length === 0) {
    grid.innerHTML = `<div class="empty-state"><p>Aucun album pour l'instant. Revenez bientôt !</p></div>`;
  } else {
    ALBUMS.forEach(album => {
      const coverStyle = album.cover
        ? `background-image: url('photos/${album.folder}/${album.cover}')`
        : '';

      const card = document.createElement('a');
      card.href = album.ready ? `album.html?album=${album.folder}` : '#';
      card.className = 'album-card' + (album.ready ? '' : ' album-coming-soon');
      card.innerHTML = `
        <div class="album-card-bg" ${coverStyle ? `style="${coverStyle}"` : ''}></div>
        ${!album.cover ? `
        <div class="album-card-placeholder">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
            <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
        </div>` : ''}
        <div class="album-card-info">
          <p class="album-card-tag">${album.tag}</p>
          <h2 class="album-card-name">${album.name}</h2>
        </div>
        ${!album.ready ? '<span class="album-card-badge">Bientôt</span>' : ''}
      `;
      grid.appendChild(card);
    });
  }
</script>
</body>
</html>

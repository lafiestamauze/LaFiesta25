<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Album – La Fiesta 25</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <!-- JSZip pour le téléchargement ZIP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #C9A84C;
      --gold-light: #F0D080;
      --dark: #0E0C0A;
      --dark2: #1A1710;
      --dark3: #252218;
      --cream: #F5F0E8;
      --text-muted: #8A8070;
    }

    body {
      background: var(--dark);
      color: var(--cream);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
    }

    nav {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1.5rem 2rem;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .nav-back {
      text-decoration: none;
      color: var(--text-muted);
      font-size: 0.8rem;
      letter-spacing: 0.05em;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      transition: color 0.2s;
    }
    .nav-back:hover { color: var(--gold); }
    .nav-back svg { width: 14px; height: 14px; }

    .nav-title {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      color: var(--cream);
      opacity: 0.6;
    }

    .nav-sep { color: rgba(255,255,255,0.2); }

    header {
      padding: 3rem 2rem 2rem;
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .header-left {}

    .album-tag {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.5rem;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.5rem, 5vw, 4rem);
      font-weight: 700;
      line-height: 1;
    }

    .photo-count {
      margin-top: 0.5rem;
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .btn-download-all {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--gold);
      color: var(--dark);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.75rem 1.5rem;
      border: none;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
      border-radius: 2px;
    }
    .btn-download-all:hover { background: var(--gold-light); }
    .btn-download-all:active { transform: scale(0.98); }
    .btn-download-all svg { width: 14px; height: 14px; }

    .btn-download-all.loading { opacity: 0.7; cursor: wait; }

    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 2rem 6rem;
    }

    .divider {
      height: 1px;
      background: rgba(255,255,255,0.07);
      margin-bottom: 2rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 3px;
    }

    .photo-item {
      position: relative;
      aspect-ratio: 4/3;
      overflow: hidden;
      cursor: pointer;
      background: var(--dark2);
    }

    .photo-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94), filter 0.3s;
      filter: brightness(0.92);
    }

    .photo-item:hover img {
      transform: scale(1.04);
      filter: brightness(1);
    }

    .photo-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0);
      display: flex;
      align-items: flex-end;
      justify-content: flex-end;
      padding: 0.75rem;
      transition: background 0.3s;
    }
    .photo-item:hover .photo-overlay { background: rgba(0,0,0,0.3); }

    .btn-dl-single {
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.2s, transform 0.2s;
      background: rgba(201,168,76,0.9);
      border: none;
      color: var(--dark);
      width: 36px;
      height: 36px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .photo-item:hover .btn-dl-single {
      opacity: 1;
      transform: translateY(0);
    }
    .btn-dl-single:hover { background: var(--gold-light); }
    .btn-dl-single svg { width: 16px; height: 16px; }

    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .lightbox.open { display: flex; }

    .lb-img-wrap {
      position: relative;
      max-width: 90vw;
      max-height: 90vh;
    }

    .lb-img-wrap img {
      max-width: 90vw;
      max-height: 85vh;
      object-fit: contain;
      display: block;
    }

    .lb-controls {
      position: fixed;
      top: 1rem;
      right: 1rem;
      display: flex;
      gap: 0.5rem;
    }

    .lb-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      color: white;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      font-size: 1.2rem;
    }
    .lb-btn:hover { background: rgba(255,255,255,0.2); }

    .lb-nav {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.08);
      border: none;
      color: white;
      width: 50px;
      height: 80px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      transition: background 0.2s;
    }
    .lb-nav:hover { background: rgba(255,255,255,0.15); }
    .lb-nav.prev { left: 0; border-radius: 0 4px 4px 0; }
    .lb-nav.next { right: 0; border-radius: 4px 0 0 4px; }

    .lb-caption {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.8rem;
      color: rgba(255,255,255,0.5);
      white-space: nowrap;
    }

    .empty-state {
      text-align: center;
      padding: 6rem 2rem;
      color: var(--text-muted);
    }
    .empty-state svg { width: 60px; height: 60px; opacity: 0.2; margin-bottom: 1rem; }
    .empty-state h2 { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--cream); opacity: 0.4; margin-bottom: 0.5rem; }

    .share-box {
      margin: 0 0 2rem;
      padding: 1rem 1.25rem;
      background: var(--dark2);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 4px;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .share-label { font-size: 0.75rem; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; }
    .share-url {
      flex: 1;
      font-size: 0.8rem;
      color: var(--gold-light);
      background: transparent;
      border: none;
      outline: none;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      min-width: 200px;
    }
    .btn-copy {
      background: transparent;
      border: 1px solid rgba(201,168,76,0.4);
      color: var(--gold);
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.4rem 0.9rem;
      cursor: pointer;
      border-radius: 2px;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .btn-copy:hover { background: rgba(201,168,76,0.1); }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .photo-item { animation: fadeIn 0.4s ease both; }
  </style>
</head>
<body>

<nav>
  <a class="nav-back" href="index.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    Retour
  </a>
  <span class="nav-sep">·</span>
  <span class="nav-title">La Fiesta 25</span>
</nav>

<header>
  <div class="header-left">
    <p class="album-tag" id="album-tag">Album</p>
    <h1 id="album-name">Chargement…</h1>
    <p class="photo-count" id="photo-count"></p>
  </div>
  <button class="btn-download-all" id="btn-dl-all" onclick="downloadAll()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    Tout télécharger
  </button>
</header>

<main>
  <div class="share-box">
    <span class="share-label">Partager</span>
    <input class="share-url" id="share-url" readonly value="" onclick="this.select()">
    <button class="btn-copy" onclick="copyLink()">Copier le lien</button>
  </div>
  <div class="divider"></div>
  <div class="grid" id="photo-grid"></div>
</main>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <div class="lb-controls">
    <button class="lb-btn" onclick="downloadCurrent()" title="Télécharger">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    </button>
    <button class="lb-btn" onclick="closeLightbox()" title="Fermer">✕</button>
  </div>
  <button class="lb-nav prev" onclick="navigate(-1)">‹</button>
  <div class="lb-img-wrap">
    <img id="lb-img" src="" alt="">
  </div>
  <button class="lb-nav next" onclick="navigate(1)">›</button>
  <p class="lb-caption" id="lb-caption"></p>
</div>

<script>
  // ─── Récupération de l'album depuis l'URL ───
  const params = new URLSearchParams(window.location.search);
  const albumFolder = params.get('album') || 'bemorgan';

  // ─────────────────────────────────────────────────────────────────────────
  // CONFIGURATION DES ALBUMS
  // Même objet que dans index.html — à maintenir synchronisé.
  // ─────────────────────────────────────────────────────────────────────────
  const ALBUMS_CONFIG = {
    bemorgan: {
      name: "Bemorgan",
      tag: "Dimanche soir",
      // Liste des fichiers photos dans photos/bemorgan/
      // Ajoute ici le nom de chaque fichier que tu déposes dans le dossier.
      photos: [
        // "photo1.jpg",
        // "photo2.jpg",
        // etc.
      ]
    },
    // Ajoute d'autres albums ici :
    // photographe2: {
    //   name: "Nom Photographe",
    //   tag: "Samedi soir",
    //   photos: ["img1.jpg", "img2.jpg"]
    // }
  };

  const config = ALBUMS_CONFIG[albumFolder];

  if (!config) {
    document.getElementById('album-name').textContent = 'Album introuvable';
  } else {
    // En-tête
    document.title = `${config.name} – La Fiesta 25`;
    document.getElementById('album-name').textContent = config.name;
    document.getElementById('album-tag').textContent = config.tag;
    document.getElementById('share-url').value = window.location.href;

    const photos = config.photos;
    const count = photos.length;
    document.getElementById('photo-count').textContent =
      count === 0 ? 'Aucune photo pour l'instant' : `${count} photo${count > 1 ? 's' : ''}`;

    // ─── Grille de photos ───
    const grid = document.getElementById('photo-grid');
    if (count === 0) {
      grid.outerHTML = `<div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        <h2>Photos à venir</h2>
        <p>Cet album sera bientôt disponible.</p>
      </div>`;
    } else {
      photos.forEach((file, i) => {
        const src = `photos/${albumFolder}/${file}`;
        const item = document.createElement('div');
        item.className = 'photo-item';
        item.style.animationDelay = `${Math.min(i * 0.03, 0.5)}s`;
        item.innerHTML = `
          <img src="${src}" alt="Photo ${i+1}" loading="lazy" onclick="openLightbox(${i})">
          <div class="photo-overlay" onclick="openLightbox(${i})">
            <button class="btn-dl-single" onclick="event.stopPropagation(); downloadSingle('${src}','${file}')" title="Télécharger">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            </button>
          </div>
        `;
        grid.appendChild(item);
      });
    }
  }

  // ─── Lightbox ───
  let currentIndex = 0;
  const photos = config ? config.photos : [];

  function openLightbox(i) {
    currentIndex = i;
    updateLightbox();
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  }

  function navigate(dir) {
    currentIndex = (currentIndex + dir + photos.length) % photos.length;
    updateLightbox();
  }

  function updateLightbox() {
    const file = photos[currentIndex];
    document.getElementById('lb-img').src = `photos/${albumFolder}/${file}`;
    document.getElementById('lb-caption').textContent = `${currentIndex + 1} / ${photos.length}`;
  }

  document.addEventListener('keydown', e => {
    if (!document.getElementById('lightbox').classList.contains('open')) return;
    if (e.key === 'ArrowLeft') navigate(-1);
    if (e.key === 'ArrowRight') navigate(1);
    if (e.key === 'Escape') closeLightbox();
  });

  document.getElementById('lightbox').addEventListener('click', function(e) {
    if (e.target === this) closeLightbox();
  });

  // ─── Téléchargements ───
  function downloadSingle(src, filename) {
    const a = document.createElement('a');
    a.href = src;
    a.download = filename;
    a.click();
  }

  function downloadCurrent() {
    const file = photos[currentIndex];
    downloadSingle(`photos/${albumFolder}/${file}`, file);
  }

  async function downloadAll() {
    if (!config || photos.length === 0) return;
    const btn = document.getElementById('btn-dl-all');
    btn.textContent = 'Préparation…';
    btn.classList.add('loading');

    try {
      const zip = new JSZip();
      const folder = zip.folder(config.name);

      await Promise.all(photos.map(async (file) => {
        const response = await fetch(`photos/${albumFolder}/${file}`);
        const blob = await response.blob();
        folder.file(file, blob);
      }));

      const content = await zip.generateAsync({ type: 'blob' });
      const url = URL.createObjectURL(content);
      const a = document.createElement('a');
      a.href = url;
      a.download = `LaFiesta25_${config.name}.zip`;
      a.click();
      URL.revokeObjectURL(url);
    } catch(e) {
      alert('Erreur lors de la création du ZIP. Essayez de télécharger les photos individuellement.');
    }

    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Tout télécharger`;
    btn.classList.remove('loading');
  }

  function copyLink() {
    const url = document.getElementById('share-url').value;
    navigator.clipboard.writeText(url).then(() => {
      const btn = document.querySelector('.btn-copy');
      btn.textContent = 'Copié !';
      setTimeout(() => btn.textContent = 'Copier le lien', 2000);
    });
  }
</script>

</body>
</html>
